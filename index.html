<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Paciência – Solitaire</title>
    <link rel="manifest" href="manifest.json">
    <link rel="shortcut icon" href="apple-touch-icon.png" type="image/png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="game-container">
        <div id="top-bar">
            <div class="brand-section">
                <h1>♠ Paciência</h1>
                <div id="item-atualizar-app" style="display:none; background:#ef4444; color:white; padding:3px 8px; border-radius:6px; font-size:11px; font-weight:bold; cursor:pointer; align-items:center; margin-top:4px;" onclick="forcarAtualizacao()">
                    🔄 Nova versão disponível! Clique para atualizar
                </div>
            </div>
            <div id="stats">
                <span>⏱ <span id="timer">00:00</span></span>
                <span>🃏 <span id="move-count">0</span> mov.</span>
                <span>🏆 Vitórias: <span id="win-count">0</span></span>
                <span>💀 Derrotas: <span id="loss-count">0</span></span>
            </div>
            <div id="controls">
                <button onclick="obterDica()" title="Dica">💡</button>
                <button onclick="desfazerJogada()" title="Voltar">↩️</button>
                <button id="mix-btn" onclick="pedirRedistribuicao()" title="Misturar">🔀</button>
                <button id="auto-btn" onclick="autoComplete()" style="display:none" title="Autocompletar">✨</button>
                <button onclick="alternarLayout()" title="Inverter Lado da Mesa">↔️</button>
                <button onclick="pedirNovoJogo()" title="Novo Jogo">🔄</button>
            </div>
        </div>

        <div id="board-top-wrapper">
            <div id="foundations-area">
                <div class="pile-slot foundation" id="f0" onclick="clickFoundation(0)"><span class="foundation-label">♠</span></div>
                <div class="pile-slot foundation" id="f1" onclick="clickFoundation(1)"><span class="foundation-label">♥</span></div>
                <div class="pile-slot foundation" id="f2" onclick="clickFoundation(2)"><span class="foundation-label">♦</span></div>
                <div class="pile-slot foundation" id="f3" onclick="clickFoundation(3)"><span class="foundation-label">♣</span></div>
            </div>

            <div id="stock-area-top">
                <div class="widget-col">
                    <div class="pile-count" id="waste-count">0</div>
                    <div class="pile-slot waste-pile" id="waste"></div>
                    <div class="pile-label">Descarte</div>
                </div>
                <div class="widget-col">
                    <div class="pile-count" id="stock-count">24</div>
                    <div class="pile-slot stock-pile" id="stock" onclick="clickStock()"></div>
                    <div class="pile-label">Maço</div>
                </div>
            </div>
        </div>

        <div id="tableau-area">
            <div class="tableau-col" id="col0"></div>
            <div class="tableau-col" id="col1"></div>
            <div class="tableau-col" id="col2"></div>
            <div class="tableau-col" id="col3"></div>
            <div class="tableau-col" id="col4"></div>
            <div class="tableau-col" id="col5"></div>
            <div class="tableau-col" id="col6"></div>
        </div>
    </div>

    <div id="toast-msg"></div>

    <div id="confirm-overlay" class="modal-overlay">
        <div class="modal-box">
            <h2 id="confirm-title">Atenção</h2>
            <p id="confirm-msg"></p>
            <div class="btn-group">
                <button class="btn-modal btn-yes" onclick="executarConfirmacao()">Sim, tenho certeza</button>
                <button class="btn-modal btn-no" onclick="fecharConfirmacao()">Cancelar</button>
            </div>
        </div>
    </div>

    <div id="win-overlay" class="modal-overlay">
        <div class="modal-box">
            <h2>🎉 Você venceu!</h2>
            <p id="win-stats"></p>
            <button class="btn-modal btn-yes" style="width:100%; background:#145220" onclick="newGame()">Jogar Novamente</button>
        </div>
    </div>

    <div id="drag-ghost"></div>

    <script src="app.js?v=1.1.6"></script>
    <script>
        let newWorker;
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => {
                        reg.addEventListener('updatefound', () => {
                            newWorker = reg.installing;
                            newWorker.addEventListener('statechange', () => {
                                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    const itemAtualizar = document.getElementById('item-atualizar-app');
                                    if (itemAtualizar) itemAtualizar.style.display = 'flex';
                                }
                            });
                        });
                    });
            });
        }

        function forcarAtualizacao() {
            if (newWorker) newWorker.postMessage({
                action: 'skipWaiting'
            });
            window.location.reload();
        }
    </script>
</body>

</html>
